# ============================================================
# CONFIGURAÇÃO DO APACHE
# ============================================================
# Este arquivo configura o servidor web Apache dentro do container.
# Ele substitui o arquivo de configuração padrão do Apache.
#
# COPIADO PARA: /etc/apache2/sites-available/000-default.conf
# Isso é feito automaticamente pelo Dockerfile com o comando COPY.
# ============================================================

<VirtualHost *:80>

    # Define onde estão os arquivos públicos do site
    DocumentRoot /var/www/html

    # ============================================================
    # CONFIGURAÇÃO DA PASTA RAIZ
    # AllowOverride All → permite que .htaccess seja lido (se houver)
    # Require all granted → permite acesso público a esta pasta
    # ============================================================
    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes
        # Options -Indexes: DESATIVA a listagem de arquivos do diretório!
        # Sem isso, quem acessar uma pasta sem index.php vê todos os arquivos.
        # Esta linha é uma medida de segurança essencial.
    </Directory>

    # ============================================================
    # BLOQUEIO DE ACESSO ÀS PASTAS DE INFRAESTRUTURA
    # ============================================================
    # As pastas abaixo contêm arquivos CRÍTICOS que nunca devem
    # ser acessíveis via navegador:
    #
    #   docker/  → contém init.sql (estrutura do banco) e o Dockerfile
    #   config/  → contém credenciais do banco de dados (database.php)
    #
    # "Require all denied" retorna HTTP 403 Forbidden para qualquer
    # tentativa de acessar esses caminhos pelo navegador.
    # ============================================================
    <Directory /var/www/html/docker>
    </Directory>

    <Directory /var/www/html/config>
    </Directory>

</VirtualHost>